<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>桃记 · 智能记账</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --pink-50: #fdf2f4;
            --pink-100: #fce7eb;
            --pink-200: #f9cdd6;
            --pink-300: #f4a3b5;
            --pink-400: #ec7a95;
            --pink-500: #d4567a;
            --pink-600: #b83d62;
            --pink-700: #9a2e50;
            --rose-grad-1: #e8b4b8;
            --rose-grad-2: #d4a0a7;
            --rose-grad-3: #c48b95;
            --bg: #faf7f8;
            --surface: #ffffff;
            --surface-2: #fdf5f7;
            --text-primary: #3d2c33;
            --text-secondary: #8c7580;
            --text-tertiary: #b8a5ad;
            --border: #f0e4e8;
            --shadow-sm: 0 1px 3px rgba(150,100,120,0.06);
            --shadow-md: 0 4px 12px rgba(150,100,120,0.08);
            --shadow-lg: 0 8px 24px rgba(150,100,120,0.12);
            --income-color: #7eb8a2;
            --income-bg: #eef6f2;
            --expense-color: #d4567a;
            --expense-bg: #fdf2f4;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg); color: var(--text-primary); line-height: 1.5;
        }

        .page { display:none; padding-bottom:100px; min-height:100vh; }
        .page.active { display:block; animation: pgIn .3s ease; }
        @keyframes pgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

        /* =================== 底部导航 =================== */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100;
            background: rgba(255,255,255,0.92); backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-top: 1px solid var(--border);
            display: flex; align-items: stretch;
            padding: 4px 0 env(safe-area-inset-bottom, 18px);
        }
        .tab-item {
            flex: 1; display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap: 2px; padding: 8px 0; font-size:10px; color: var(--text-tertiary);
            cursor: pointer; transition: color .2s; position: relative;
        }
        .tab-item i { font-size:20px; }
        .tab-item.active { color: var(--pink-500); }
        .tab-item.active::after {
            content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
            width:20px; height:2px; background: var(--pink-400); border-radius:1px;
        }
        /* 语音按钮特殊样式 */
        .tab-item.voice-tab i {
            width:50px; height:50px; display:flex; align-items:center; justify-content:center;
            background: linear-gradient(135deg, var(--rose-grad-1), var(--rose-grad-3));
            border-radius:50%; color:#fff; font-size:20px; margin-top:-18px;
            box-shadow: 0 4px 16px rgba(196,139,149,0.35);
        }

        /* =================== 通用组件 =================== */
        .page-header {
            padding: 50px 20px 16px; background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .page-title { font-size:24px; font-weight:800; color: var(--text-primary); }
        .page-subtitle { font-size:12px; color: var(--text-tertiary); margin-top:3px; }

        .card {
            background: var(--surface); border-radius: var(--radius-md);
            padding: 18px; margin: 12px 16px; box-shadow: var(--shadow-sm);
        }
        .card-title { font-size:13px; color:var(--text-secondary); font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
        .card-title i { color: var(--pink-400); }

        .badge {
            display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:500;
        }
        .badge-income { background:var(--income-bg); color:var(--income-color); }
        .badge-expense { background:var(--expense-bg); color:var(--expense-color); }

        .toast {
            position:fixed; top:50px; left:50%; transform:translateX(-50%);
            background:rgba(61,44,51,0.88); color:#fff; padding:12px 28px;
            border-radius:30px; font-size:14px; z-index:999; display:none;
            backdrop-filter:blur(10px);
        }

        /* ====================================================
           PAGE 1: 首页
        ==================================================== */
        .hero {
            background: linear-gradient(160deg, #f5e1e5 0%, #eddde1 40%, #e8d5db 100%);
            padding: 50px 24px 30px; position:relative; overflow:hidden;
        }
        .hero::before {
            content:''; position:absolute; top:-60px; right:-40px;
            width:160px; height:160px; border-radius:50%;
            background: rgba(255,255,255,0.25);
        }
        .hero::after {
            content:''; position:absolute; bottom:-30px; left:-20px;
            width:100px; height:100px; border-radius:50%;
            background: rgba(212,86,122,0.08);
        }
        .hero-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; position:relative; z-index:1; }
        .hero-greeting { font-size:14px; color:var(--text-secondary); }
        .hero-greeting b { color:var(--text-primary); font-size:18px; display:block; margin-top:2px; }
        .hero-avatar {
            width:42px; height:42px; border-radius:50%;
            background: linear-gradient(135deg, var(--pink-300), var(--pink-200));
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:18px; box-shadow: var(--shadow-md);
        }
        .hero-cards { display:flex; gap:12px; position:relative; z-index:1; }
        .hero-card {
            flex:1; border-radius:var(--radius-md); padding:18px 16px;
            backdrop-filter: blur(10px); position:relative; overflow:hidden;
        }
        .hero-card.income {
            background: rgba(126,184,162,0.12); border: 1px solid rgba(126,184,162,0.2);
        }
        .hero-card.expense {
            background: rgba(212,86,122,0.1); border: 1px solid rgba(212,86,122,0.15);
        }
        .hc-label { font-size:11px; color:var(--text-secondary); margin-bottom:4px; display:flex; align-items:center; gap:4px; }
        .hc-label i.income-dot { color:var(--income-color); }
        .hc-label i.expense-dot { color:var(--expense-color); }
        .hc-val { font-size:22px; font-weight:700; }
        .hc-val.income-val { color: var(--income-color); }
        .hc-val.expense-val { color: var(--expense-color); }

        /* 快速操作 */
        .quick-row {
            display:grid; grid-template-columns: repeat(4,1fr); gap:10px;
            padding: 16px; 
        }
        .quick-btn {
            display:flex; flex-direction:column; align-items:center; gap:8px;
            padding:14px 0; background:var(--surface); border-radius:var(--radius-md);
            box-shadow:var(--shadow-sm); cursor:pointer; transition: transform .15s;
        }
        .quick-btn:active { transform:scale(0.95); }
        .quick-btn i {
            width:40px; height:40px; border-radius:12px; display:flex;
            align-items:center; justify-content:center; font-size:18px; color:#fff;
        }
        .quick-btn span { font-size:11px; color:var(--text-secondary); }

        /* 首页列表 */
        .home-list { padding: 0 16px; }
        .home-list-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .home-list-title { font-size:16px; font-weight:700; }
        .home-list-more { font-size:12px; color:var(--pink-400); cursor:pointer; }

        .rec-item {
            background:var(--surface); border-radius:var(--radius-md); padding:14px 16px;
            margin-bottom:10px; display:flex; align-items:center; gap:14px;
            box-shadow: var(--shadow-sm); transition: transform .15s;
        }
        .rec-item:active { transform: scale(0.98); }
        .rec-icon {
            width:44px; height:44px; border-radius:14px; display:flex;
            align-items:center; justify-content:center; font-size:18px; color:#fff; flex-shrink:0;
        }
        .rec-body { flex:1; min-width:0; }
        .rec-desc { font-size:15px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .rec-meta { display:flex; align-items:center; gap:6px; margin-top:3px; }
        .rec-time { font-size:11px; color:var(--text-tertiary); }
        .rec-right { text-align:right; flex-shrink:0; }
        .rec-amount { font-size:16px; font-weight:700; }
        .rec-amount.is-income { color:var(--income-color); }
        .rec-amount.is-expense { color:var(--expense-color); }
        .rec-del { font-size:11px; color:var(--pink-400); margin-top:3px; cursor:pointer; opacity:0.7; }

        .empty { text-align:center; padding:50px 0; color:var(--text-tertiary); }
        .empty i { font-size:48px; margin-bottom:8px; color:var(--pink-200); }

        /* ====================================================
           PAGE 2: 明细（搜索筛选）
        ==================================================== */
        /* 筛选栏 */
        .filter-bar {
            padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border);
            display:flex; flex-direction:column; gap:10px;
        }
        .filter-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .filter-chip {
            padding:7px 14px; border-radius:20px; font-size:13px;
            background:var(--pink-50); color:var(--text-secondary);
            border:1.5px solid transparent; cursor:pointer; transition:all .2s;
            white-space:nowrap;
        }
        .filter-chip.active { border-color:var(--pink-400); color:var(--pink-500); background:var(--pink-100); font-weight:600; }
        .filter-chip i { margin-right:4px; }

        .search-box {
            display:flex; align-items:center; gap:8px;
            background:var(--pink-50); border-radius:12px; padding:0 14px;
        }
        .search-box i { color:var(--text-tertiary); font-size:14px; }
        .search-box input {
            flex:1; border:none; background:transparent; padding:11px 0;
            font-size:14px; outline:none; color:var(--text-primary);
        }
        .search-box input::placeholder { color:var(--text-tertiary); }

        /* 日期选择器 */
        .date-picker-row { display:flex; gap:8px; align-items:center; }
        .date-input {
            flex:1; padding:9px 12px; border-radius:10px; border:1.5px solid var(--border);
            font-size:13px; background:var(--surface); color:var(--text-primary); outline:none;
        }
        .date-input:focus { border-color: var(--pink-300); }

        /* 分组日期标题 */
        .date-group-title {
            padding:10px 16px 6px; font-size:13px; font-weight:600; color:var(--text-secondary);
            display:flex; justify-content:space-between;
        }
        .date-group-total { color:var(--pink-400); font-weight:500; }

        /* ====================================================
           PAGE 3: 统计
        ==================================================== */
        .stats-summary {
            display:grid; grid-template-columns: repeat(3,1fr); gap:10px; padding:12px 16px;
        }
        .stat-box {
            background:var(--surface); border-radius:var(--radius-md); padding:16px 12px;
            text-align:center; box-shadow:var(--shadow-sm);
        }
        .stat-label { font-size:11px; color:var(--text-tertiary); }
        .stat-val { font-size:20px; font-weight:700; margin-top:4px; }

        .chart-section { padding:0 16px 16px; }
        .chart-card {
            background:var(--surface); border-radius:var(--radius-md); padding:16px;
            margin-bottom:12px; box-shadow:var(--shadow-sm);
        }
        .chart-head { font-size:14px; font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
        .chart-head i { color:var(--pink-400); }
        .chart-box { width:100%; height:250px; }

        .rank-item {
            display:flex; align-items:center; gap:12px; padding:12px 0;
            border-bottom:1px solid var(--border);
        }
        .rank-item:last-child { border:none; }
        .rank-num { width:20px; font-size:14px; font-weight:700; color:var(--pink-300); text-align:center; }
        .rank-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; }
        .rank-info { flex:1; }
        .rank-name { font-size:14px; font-weight:600; }
        .rank-bar-bg { height:5px; background:var(--pink-50); border-radius:3px; margin-top:5px; overflow:hidden; }
        .rank-bar { height:100%; border-radius:3px; transition: width .8s ease; }
        .rank-val { font-size:14px; font-weight:700; color:var(--text-primary); }

        /* ====================================================
           PAGE 4: 记账
        ==================================================== */
        .add-page { background: var(--bg); }

        /* 收支切换 */
        .type-switch {
            display:flex; margin:16px; background:var(--pink-50); border-radius:14px; padding:4px;
        }
        .type-btn {
            flex:1; text-align:center; padding:12px; border-radius:12px; font-size:15px;
            font-weight:600; cursor:pointer; transition:all .25s; color:var(--text-secondary);
        }
        .type-btn.active-expense { background:var(--surface); color:var(--expense-color); box-shadow:var(--shadow-sm); }
        .type-btn.active-income { background:var(--surface); color:var(--income-color); box-shadow:var(--shadow-sm); }

        /* 金额输入 */
        .amount-display {
            text-align:center; padding:10px 20px 20px;
        }
        .amount-display .prefix { font-size:24px; color:var(--text-tertiary); }
        .amount-display .amount-input {
            font-size:48px; font-weight:800; border:none; background:transparent;
            text-align:center; width:100%; outline:none; color:var(--text-primary);
        }
        .amount-display .amount-input::placeholder { color:var(--pink-200); }
        .amount-display .amount-input.income-mode { color:var(--income-color); }

        /* 分类网格 */
        .cat-grid {
            display:grid; grid-template-columns: repeat(5,1fr); gap:8px;
            padding:0 16px 16px;
        }
        .cat-item {
            display:flex; flex-direction:column; align-items:center; gap:6px;
            padding:10px 0; border-radius:14px; cursor:pointer; transition:all .2s;
            background:transparent; border:2px solid transparent;
        }
        .cat-item.selected { background:var(--pink-50); border-color:var(--pink-300); }
        .cat-item-icon {
            width:38px; height:38px; border-radius:12px; display:flex;
            align-items:center; justify-content:center; font-size:16px; color:#fff;
        }
        .cat-item span { font-size:10px; color:var(--text-secondary); }

        .remark-row {
            margin:0 16px 12px; display:flex; gap:8px;
        }
        .remark-input {
            flex:1; padding:14px 16px; border:1.5px solid var(--border); border-radius:14px;
            font-size:14px; outline:none; background:var(--surface);
        }
        .remark-input:focus { border-color:var(--pink-300); }

        .save-btn {
            margin:8px 16px; padding:16px; border:none; border-radius:14px;
            font-size:16px; font-weight:700; color:#fff; width:calc(100% - 32px);
            cursor:pointer; transition:transform .15s;
        }
        .save-btn:active { transform:scale(0.97); }
        .save-btn.expense-btn { background: linear-gradient(135deg, var(--rose-grad-1), var(--rose-grad-3)); }
        .save-btn.income-btn { background: linear-gradient(135deg, #a8d5c2, #7eb8a2); }

        /* ====================================================
           PAGE 5: 预算 / 我的
        ==================================================== */
        .profile-hero {
            background: linear-gradient(160deg, #f5e1e5, #eddde1);
            padding:50px 24px 24px; text-align:center;
        }
        .profile-avatar {
            width:64px; height:64px; border-radius:50%; margin:0 auto 10px;
            background:linear-gradient(135deg,var(--pink-300),var(--pink-200));
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:28px; box-shadow:var(--shadow-md);
        }
        .profile-name { font-size:18px; font-weight:700; }
        .profile-sub { font-size:12px; color:var(--text-secondary); margin-top:2px; }

        .budget-card {
            background:var(--surface); border-radius:var(--radius-md); margin:12px 16px;
            padding:18px; box-shadow:var(--shadow-sm);
        }
        .budget-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .budget-title { font-size:14px; font-weight:600; }
        .budget-edit { font-size:12px; color:var(--pink-400); cursor:pointer; }
        .budget-bar-bg { height:10px; background:var(--pink-50); border-radius:5px; overflow:hidden; margin-bottom:8px; }
        .budget-bar { height:100%; border-radius:5px; background:linear-gradient(90deg, var(--rose-grad-1), var(--pink-400)); transition:width .6s; }
        .budget-bar.over { background:linear-gradient(90deg, #e88, #d44); }
        .budget-info { display:flex; justify-content:space-between; font-size:12px; color:var(--text-secondary); }

        .menu-list { margin:12px 16px; background:var(--surface); border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
        .menu-item {
            display:flex; align-items:center; gap:14px; padding:16px 18px;
            border-bottom:1px solid var(--border); cursor:pointer;
        }
        .menu-item:last-child { border:none; }
        .menu-item i.mi-icon { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; }
        .menu-item .mi-text { flex:1; font-size:14px; font-weight:500; }
        .menu-item .mi-arrow { color:var(--text-tertiary); font-size:12px; }

        /* =================== 语音弹窗 =================== */
        .voice-modal {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(61,44,51,0.5); backdrop-filter:blur(8px);
            display:none; align-items:center; justify-content:center; z-index:300;
        }
        .voice-sheet {
            background:var(--surface); width:88%; max-width:360px; border-radius:var(--radius-xl);
            padding:36px 28px; text-align:center; animation: vPop .3s ease;
        }
        @keyframes vPop { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }

        /* 语音收支切换 */
        .v-type-switch { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
        .v-type-btn {
            padding:8px 20px; border-radius:20px; font-size:13px; font-weight:600;
            cursor:pointer; border:1.5px solid var(--border); color:var(--text-secondary);
            transition:all .2s;
        }
        .v-type-btn.v-active-expense { border-color:var(--expense-color); color:var(--expense-color); background:var(--expense-bg); }
        .v-type-btn.v-active-income { border-color:var(--income-color); color:var(--income-color); background:var(--income-bg); }

        .v-mic {
            width:80px; height:80px; margin:0 auto 16px;
            background:linear-gradient(135deg, var(--rose-grad-1), var(--rose-grad-3));
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:30px; animation:vPulse 1.5s infinite;
        }
        .v-mic.v-income-mic { background:linear-gradient(135deg,#a8d5c2,#7eb8a2); }
        @keyframes vPulse {
            0%{box-shadow:0 0 0 0 rgba(196,139,149,0.4)} 70%{box-shadow:0 0 0 25px rgba(196,139,149,0)} 100%{box-shadow:0 0 0 0 rgba(196,139,149,0)}
        }
        .v-status { font-size:18px; font-weight:600; margin-bottom:6px; color:var(--text-primary); }
        .v-hint { font-size:12px; color:var(--text-tertiary); line-height:1.7; }
        .v-actions { display:flex; gap:10px; justify-content:center; margin-top:18px; }
        .v-btn { padding:10px 24px; border-radius:20px; border:none; font-size:13px; cursor:pointer; }
        .v-btn-cancel { background:var(--pink-50); color:var(--text-secondary); }
        .v-btn-retry { background:linear-gradient(135deg,var(--rose-grad-1),var(--rose-grad-3)); color:#fff; }

        /* =================== 弹窗通用 =================== */
        .modal-overlay {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(61,44,51,0.4); backdrop-filter:blur(6px);
            display:none; align-items:flex-end; z-index:250;
        }
        .modal-sheet {
            background:var(--surface); width:100%; border-radius:var(--radius-xl) var(--radius-xl) 0 0;
            padding:24px; animation:sheetUp .3s ease;
        }
        @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- =================== PAGE 1: 首页 =================== -->
<div id="page-home" class="page active">
    <div class="hero">
        <div class="hero-top">
            <div class="hero-greeting">
                <span id="greetText">上午好</span>
                <b>我的账本</b>
            </div>
            <div class="hero-avatar"><i class="fas fa-user"></i></div>
        </div>
        <div class="hero-cards">
            <div class="hero-card income">
                <div class="hc-label"><i class="fas fa-circle income-dot" style="font-size:6px"></i> 本月收入</div>
                <div class="hc-val income-val" id="homeIncome">0.00</div>
            </div>
            <div class="hero-card expense">
                <div class="hc-label"><i class="fas fa-circle expense-dot" style="font-size:6px"></i> 本月支出</div>
                <div class="hc-val expense-val" id="homeExpense">0.00</div>
            </div>
        </div>
    </div>

    <div class="quick-row">
        <div class="quick-btn" onclick="go('add')">
            <i style="background:linear-gradient(135deg,var(--rose-grad-1),var(--rose-grad-3))"><em class="fas fa-pen"></em></i>
            <span>记支出</span>
        </div>
        <div class="quick-btn" onclick="goAddIncome()">

    <div class="tab-item" id="nav-detail" onclick="go('detail')"><i class="fas fa-receipt"></i><span>明细</span></div>
    <div class="tab-item voice-tab" onclick="startVoice()"><i class="fas fa-microphone"></i><span>语音</span></div>

    <div class="tab-item" id="nav-me" onclick="go('me')"><i class="fas fa-user"></i><span>我的</span></div>
</nav>

<script>
// =================== 分类配置 ===================
const EXPENSE_CATS = {
    food:    { name:'餐饮', icon:'fa-utensils',        color:'#d4a0a7', kw:['吃','喝','饭','面','菜','外卖','奶茶','咖啡','早餐','午餐','晚餐','零食','烧烤','火锅','蛋糕','水果','饮料','食堂','夜宵','小吃','甜品','便当'] },
    transport:{ name:'出行', icon:'fa-car-side',       color:'#92adb8', kw:['车','打车','公交','地铁','高铁','飞机','加油','停车','出租','滴滴','骑行','单车','油费','火车','票'] },
    shop:    { name:'购物', icon:'fa-bag-shopping',    color:'#c4a5b5', kw:['买','衣服','鞋','裤','淘宝','京东','超市','日用','护肤','化妆','口红','洗'] },
    fun:     { name:'娱乐', icon:'fa-gamepad',         color:'#b5a5c4', kw:['电影','游戏','唱歌','KTV','酒吧','玩','门票','旅游','景点','演出','剧本杀'] },
    house:   { name:'居住', icon:'fa-house-chimney',   color:'#c4b892', kw:['房租','水电','物业','燃气','宽带','暖气','维修','家具','搬家'] },
    medical: { name:'医疗', icon:'fa-heart-pulse',     color:'#c49292', kw:['医','药','体检','挂号','看病','手术','疫苗','牙','眼镜'] },
    study:   { name:'学习', icon:'fa-book',            color:'#92b8b5', kw:['书','课','培训','学费','考试','网课','文具'] },
    social:  { name:'社交', icon:'fa-champagne-glasses',color:'#b8a592', kw:['请客','红包','礼物','聚餐','份子钱','生日','送'] },
    pet:     { name:'宠物', icon:'fa-paw',             color:'#c4b5a5', kw:['猫','狗','宠物','猫粮','狗粮'] },
    comm:    { name:'通讯', icon:'fa-mobile-screen',   color:'#a5b5c4', kw:['话费','流量','充值','会员','订阅','VIP'] },
    other:   { name:'其他', icon:'fa-ellipsis',        color:'#aaa5a8', kw:[] }
};

const INCOME_CATS = {
    salary:  { name:'工资', icon:'fa-briefcase',       color:'#7eb8a2', kw:['工资','薪水','月薪','发工资'] },
    bonus:   { name:'奖金', icon:'fa-trophy',          color:'#92b88a', kw:['奖金','年终','绩效','提成','分红'] },
    reimb:   { name:'报销', icon:'fa-file-invoice',    color:'#8ab892', kw:['报销','补贴','补助'] },
    invest:  { name:'理财', icon:'fa-chart-line',      color:'#7eaab8', kw:['利息','收益','分红','理财','基金','股票'] },
    gift:    { name:'红包', icon:'fa-gift',            color:'#b8a27e', kw:['红包','转账','收到'] },
    parttime:{ name:'兼职', icon:'fa-laptop',          color:'#8a92b8', kw:['兼职','外快','副业','稿费'] },
    other_in:{ name:'其他', icon:'fa-ellipsis',        color:'#aaa5a8', kw:[] }
};

let records = JSON.parse(localStorage.getItem('peachRecords')) || [];
let budget = parseFloat(localStorage.getItem('peachBudget')) || 0;
let addType = 'expense';
let selectedCat = 'food';
let voiceType = 'expense';

// 筛选状态
let filterType = 'all';
let filterRange = 'all';

let pieChart, lineChart;

// =================== 初始化 ===================
window.onload = () => {
    updateGreeting();
    renderAddCats();
    renderAll();
    pieChart = echarts.init(document.getElementById('pieChart'));
    lineChart = echarts.init(document.getElementById('lineChart'));
    window.addEventListener('resize', () => { pieChart?.resize(); lineChart?.resize(); });
};

function updateGreeting() {
    const h = new Date().getHours();
    let g = '深夜好 🌙';
    if (h >= 6 && h < 12) g = '早上好 ☀️';
    else if (h >= 12 && h < 14) g = '中午好 🌤';
    else if (h >= 14 && h < 18) g = '下午好 ☕';
    else if (h >= 18 && h < 22) g = '晚上好 🌆';
    document.getElementById('greetText').textContent = g;
}

// =================== 导航 ===================
function go(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`page-${tab}`).classList.add('active');
    const navEl = document.getElementById(`nav-${tab}`);
    if (navEl) navEl.classList.add('active');
    if (tab === 'stats') updateCharts();
    if (tab === 'detail') applyFilters();
    if (tab === 'me') renderBudget();
}

function goAddIncome() {
    go('add');
    setAddType('income');
}

// =================== 记账类型切换 ===================
function setAddType(type) {
    addType = type;
    const eBtn = document.getElementById('addTypeExpense');
    const iBtn = document.getElementById('addTypeIncome');
    const amtInput = document.getElementById('addAmount');
    const saveBtn = document.getElementById('addSaveBtn');

    eBtn.className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
    iBtn.className = 'type-btn' + (type === 'income' ? ' active-income' : '');
    amtInput.className = 'amount-input' + (type === 'income' ? ' income-mode' : '');
    saveBtn.className = 'save-btn ' + (type === 'expense' ? 'expense-btn' : 'income-btn');
    saveBtn.textContent = type === 'expense' ? '保存支出' : '保存收入';

    selectedCat = type === 'expense' ? 'food' : 'salary';
    renderAddCats();
}

// =================== 分类渲染 ===================
function renderAddCats() {
    const grid = document.getElementById('addCatGrid');
    const cats = addType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
    grid.innerHTML = '';
    for (let k in cats) {
        const c = cats[k];
        grid.innerHTML += `
            <div class="cat-item ${k === selectedCat ? 'selected' : ''}" onclick="pickCat('${k}')">
                <div class="cat-item-icon" style="background:${c.color}"><i class="fas ${c.icon}"></i></div>
                <span>${c.name}</span>
            </div>`;
    }
}

function pickCat(k) { selectedCat = k; renderAddCats(); }

// =================== 自动分类 ===================
function autoCat(text, type) {
    const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
    for (let k in cats) {
        if (cats[k].kw && cats[k].kw.some(w => text.includes(w))) return k;
    }
    return type === 'expense' ? 'other' : 'other_in';
}

// =================== 保存记录 ===================
function saveRecord() {
    const amt = parseFloat(document.getElementById('addAmount').value);
    const remark = document.getElementById('addRemark').value.trim();
    if (!amt || amt <= 0) { toast('请输入有效金额'); return; }

    // 如果有备注，自动匹配更合适的分类
    let finalCat = selectedCat;
    if (remark) {
        const detected = autoCat(remark, addType);
        if (detected !== 'other' && detected !== 'other_in') finalCat = detected;
    }

    const cats = addType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
    records.push({
        id: Date.now(), amount: amt, type: addType,
        desc: remark || cats[finalCat].name, cat: finalCat, ts: Date.now()
    });
    save(); renderAll();
    document.getElementById('addAmount').value = '';
    document.getElementById('addRemark').value = '';
    toast(addType === 'expense' ? '✓ 支出已记录' : '✓ 收入已记录');
    go('home');
}

function deleteRecord(id) {
    records = records.filter(r => r.id !== id);
    save(); renderAll(); applyFilters(); updateCharts();
    toast('已删除');
}

function save() { localStorage.setItem('peachRecords', JSON.stringify(records)); }

// =================== 渲染首页 ===================
function renderAll() {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    let mIncome = 0, mExpense = 0;
    records.forEach(r => {
        if (r.ts >= monthStart) {
            if (r.type === 'income') mIncome += r.amount;
            else mExpense += r.amount;
        }
    });
    document.getElementById('homeIncome').textContent = mIncome.toFixed(2);
    document.getElementById('homeExpense').textContent = mExpense.toFixed(2);

    // 首页列表（最近10条）
    const list = document.getElementById('homeList');
    list.innerHTML = '';
    if (!records.length) {
        list.innerHTML = '<div class="empty"><i class="fas fa-wallet"></i><br>暂无记录</div>';
        return;
    }
    const sorted = [...records].sort((a, b) => b.ts - a.ts).slice(0, 10);
    sorted.forEach(r => { list.innerHTML += buildRecItem(r); });
}

function buildRecItem(r) {
    const isIncome = r.type === 'income';
    const cats = isIncome ? INCOME_CATS : EXPENSE_CATS;
    const c = cats[r.cat] || (isIncome ? INCOME_CATS.other_in : EXPENSE_CATS.other);
    const d = new Date(r.ts);
    const ds = `${d.getFullYear()}/${(d.getMonth()+1+'').padStart(2,'0')}/${(d.getDate()+'').padStart(2,'0')} ${(d.getHours()+'').padStart(2,'0')}:${(d.getMinutes()+'').padStart(2,'0')}`;
    return `<div class="rec-item">
        <div class="rec-icon" style="background:${c.color}"><i class="fas ${c.icon}"></i></div>
        <div class="rec-body">
            <div class="rec-desc">${r.desc}</div>
            <div class="rec-meta">
                <span class="badge ${isIncome ? 'badge-income' : 'badge-expense'}">${isIncome ? '收入' : '支出'}</span>
                <span class="rec-time">${ds}</span>
            </div>
        </div>
        <div class="rec-right">
            <div class="rec-amount ${isIncome ? 'is-income' : 'is-expense'}">${isIncome ? '+' : '-'}${r.amount.toFixed(2)}</div>
            <div class="rec-del" onclick="event.stopPropagation();deleteRecord(${r.id})">删除</div>
        </div>
    </div>`;
}

// =================== 明细页筛选 ===================
function setTypeFilter(type, el) {
    filterType = type;
    el.parentNode.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
}

function setRangeFilter(range, el) {
    filterRange = range;
    el.parentNode.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('customDateRow').style.display = range === 'custom' ? 'flex' : 'none';
    applyFilters();
}

function applyFilters() {
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const now = new Date();
    let start = 0, end = Infinity;

    if (filterRange === 'day') {
        start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    } else if (filterRange === 'month') {
        start = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    } else if (filterRange === 'year') {
        start = new Date(now.getFullYear(), 0, 1).getTime();
    } else if (filterRange === 'custom') {
        const f = document.getElementById('dateFrom').value;
        const t = document.getElementById('dateTo').value;
        if (f) start = new Date(f).getTime();
        if (t) end = new Date(t).getTime() + 86400000;
    }

    let filtered = records.filter(r => {
        if (filterType !== 'all' && r.type !== filterType) return false;
        if (r.ts < start || r.ts >= end) return false;
        if (keyword && !r.desc.toLowerCase().includes(keyword)) return false;
        return true;
    }).sort((a, b) => b.ts - a.ts);

    // 按日期分组
    const groups = {};
    filtered.forEach(r => {
        const d = new Date(r.ts);
        const key = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
    });

    const container = document.getElementById('detailList');
    container.innerHTML = '';
    if (!filtered.length) {
        container.innerHTML = '<div class="empty" style="padding:40px"><i class="fas fa-search"></i><br>无匹配记录</div>';
        return;
    }

    for (let dateKey in groups) {
        const items = groups[dateKey];
        let dayIncome = 0, dayExpense = 0;
        items.forEach(r => { r.type === 'income' ? dayIncome += r.amount : dayExpense += r.amount; });
        container.innerHTML += `<div class="date-group-title">
            <span>${dateKey}</span>
            <span class="date-group-total">收 ${dayIncome.toFixed(2)} / 支 ${dayExpense.toFixed(2)}</span>
        </div>`;
        items.forEach(r => { container.innerHTML += `<div style="padding:0 16px">${buildRecItem(r)}</div>`; });
    }
}

// =================== 统计页 ===================
function updateCharts() {
    const expenses = records.filter(r => r.type === 'expense');
    const incomes = records.filter(r => r.type === 'income');
    const totalExp = expenses.reduce((s, r) => s + r.amount, 0);
    const totalInc = incomes.reduce((s, r) => s + r.amount, 0);
    const days = new Set(records.map(r => new Date(r.ts).toDateString())).size || 1;
    const maxExp = expenses.length ? Math.max(...expenses.map(r => r.amount)) : 0;

    document.getElementById('sAvg').textContent = '¥' + (totalExp / days).toFixed(0);
    document.getElementById('sMax').textContent = '¥' + maxExp.toFixed(0);
    document.getElementById('sBalance').textContent = '¥' + (totalInc - totalExp).toFixed(0);

    // 饼图
    let catTotals = {};
    expenses.forEach(r => { catTotals[r.cat] = (catTotals[r.cat] || 0) + r.amount; });
    const pieData = Object.entries(catTotals).map(([k, v]) => ({
        name: (EXPENSE_CATS[k] || EXPENSE_CATS.other).name,
        value: +v.toFixed(2),
        itemStyle: { color: (EXPENSE_CATS[k] || EXPENSE_CATS.other).color }
    })).sort((a, b) => b.value - a.value);

    pieChart.setOption({
        tooltip: { trigger:'item', formatter:'{b}: ¥{c} ({d}%)' },
        series: [{ type:'pie', radius:['40%','72%'],
            itemStyle:{ borderRadius:8, borderColor:'#fff', borderWidth:3 },
            label:{ show:true, formatter:'{b}\n{d}%', fontSize:11, color:'#8c7580' },
            emphasis:{ label:{ fontSize:14, fontWeight:'bold' } },
            data: pieData.length ? pieData : [{ name:'暂无', value:0, itemStyle:{color:'#eee'} }]
        }]
    }, true);

    // 折线图
    let last7 = [], dayExpMap = {}, dayIncMap = {};
    const today = new Date();
    for (let i = 6; i >= 0; i--) {
        let d = new Date(today); d.setDate(today.getDate() - i);
        let key = `${d.getMonth()+1}/${d.getDate()}`;
        last7.push(key); dayExpMap[key] = 0; dayIncMap[key] = 0;
    }
    records.forEach(r => {
        let d = new Date(r.ts);
        let key = `${d.getMonth()+1}/${d.getDate()}`;
        if (r.type === 'expense' && dayExpMap[key] !== undefined) dayExpMap[key] += r.amount;
        if (r.type === 'income' && dayIncMap[key] !== undefined) dayIncMap[key] += r.amount;
    });

    lineChart.setOption({
        tooltip: { trigger:'axis' },
        legend: { data:['支出','收入'], bottom:0, textStyle:{fontSize:11, color:'#8c7580'} },
        grid: { left:'10%', right:'5%', top:'10%', bottom:'18%' },
        xAxis: { type:'category', data:last7, axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#b8a5ad'} },
        yAxis: { type:'value', splitLine:{lineStyle:{type:'dashed', color:'#f0e4e8'}}, axisLine:{show:false}, axisLabel:{color:'#b8a5ad'} },
        series: [
            { name:'支出', type:'line', smooth:true, data:Object.values(dayExpMap).map(v=>+v.toFixed(2)),
              lineStyle:{color:'#d4a0a7',width:2.5}, itemStyle:{color:'#d4a0a7'},
              areaStyle:{ color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(212,160,167,0.25)'},{offset:1,color:'rgba(212,160,167,0)'}]) }
            },
            { name:'收入', type:'line', smooth:true, data:Object.values(dayIncMap).map(v=>+v.toFixed(2)),
              lineStyle:{color:'#7eb8a2',width:2.5}, itemStyle:{color:'#7eb8a2'},
              areaStyle:{ color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(126,184,162,0.2)'},{offset:1,color:'rgba(126,184,162,0)'}]) }
            }
        ]
    }, true);

    // 排行
    const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
    const maxVal = sorted[0]?.[1] || 1;
    const rl = document.getElementById('rankList');
    rl.innerHTML = '';
    if (!sorted.length) { rl.innerHTML = '<div class="empty" style="padding:20px">暂无数据</div>'; return; }
    sorted.forEach(([k, v], i) => {
        const c = EXPENSE_CATS[k] || EXPENSE_CATS.other;
        rl.innerHTML += `<div class="rank-item">
            <div class="rank-num">${i+1}</div>
            <div class="rank-icon" style="background:${c.color}"><i class="fas ${c.icon}"></i></div>
            <div class="rank-info">
                <div class="rank-name">${c.name}</div>
                <div class="rank-bar-bg"><div class="rank-bar" style="width:${(v/maxVal*100).toFixed(0)}%;background:${c.color}"></div></div>
            </div>
            <div class="rank-val">¥${v.toFixed(0)}</div>
        </div>`;
    });
}

// =================== 预算 ===================
function renderBudget() {
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    let used = 0;
    records.forEach(r => { if (r.type === 'expense' && r.ts >= monthStart) used += r.amount; });
    document.getElementById('budgetUsed').textContent = used.toFixed(0);
    document.getElementById('budgetTotal').textContent = budget.toFixed(0);
    const pct = budget > 0 ? Math.min((used / budget * 100), 100) : 0;
    const bar = document.getElementById('budgetBar');
    bar.style.width = pct + '%';
    bar.className = 'budget-bar' + (pct >= 100 ? ' over' : '');
}

function editBudget() { document.getElementById('budgetModal').style.display = 'flex'; }
function closeBudgetModal() { document.getElementById('budgetModal').style.display = 'none'; }
function saveBudget() {
    const val = parseFloat(document.getElementById('budgetInput').value);
    if (!val || val <= 0) { toast('请输入有效预算'); return; }
    budget = val;
    localStorage.setItem('peachBudget', budget);
    closeBudgetModal();
    renderBudget();
    toast('预算已设置');
}

// =================== 语音识别 ===================
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

function setVoiceType(type) {
    voiceType = type;
    document.getElementById('vTypeExpense').className = 'v-type-btn' + (type === 'expense' ? ' v-active-expense' : '');
    document.getElementById('vTypeIncome').className = 'v-type-btn' + (type === 'income' ? ' v-active-income' : '');
    document.getElementById('vMic').className = 'v-mic' + (type === 'income' ? ' v-income-mic' : '');
}

function startVoice() {
    if (!SR) { toast('浏览器不支持语音识别'); return; }
    document.getElementById('voiceModal').style.display = 'flex';
    document.getElementById('vStatus').textContent = '正在聆听...';
    beginRecognition();
}

function beginRecognition() {
    recognition = new SR();
    recognition.lang = 'zh-CN';
    recognition.interimResults = false;
    try { recognition.start(); } catch(e) { toast('麦克风启动失败'); cancelVoice(); }

    recognition.onresult = e => {
        const text = e.results[0][0].transcript;
        document.getElementById('vStatus').textContent = `"${text}"`;
        setTimeout(() => {
            const r = parseVoice(text);
            if (r) {
                const cats = voiceType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
                records.push({ id:Date.now(), amount:r.amount, type:voiceType, desc:r.desc, cat:r.cat, ts:Date.now() });
                save(); renderAll();
                toast(voiceType === 'expense' ? `✓ 支出 ¥${r.amount}` : `✓ 收入 ¥${r.amount}`);
            } else {
                toast('未识别到金额');
            }
            cancelVoice();
        }, 800);
    };
    recognition.onerror = () => {
        document.getElementById('vStatus').textContent = '识别失败，请重试';
    };
}

function cancelVoice() {
    document.getElementById('voiceModal').style.display = 'none';
    try { recognition?.stop(); } catch(e) {}
}

function retryVoice() {
    try { recognition?.stop(); } catch(e) {}
    document.getElementById('vStatus').textContent = '正在聆听...';
    setTimeout(beginRecognition, 300);
}

function parseVoice(text) {
    const cn = {'零':0,'一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
    let t = text;
    // 处理中文数字
    t = t.replace(/([一二两三四五六七八九])千([一二两三四五六七八九])百/g, (_, a, b) => cn[a]*1000 + cn[b]*100);
    t = t.replace(/([一二两三四五六七八九])千/g, (_, a) => cn[a]*1000);
    t = t.replace(/([一二两三四五六七八九])百([一二两三四五六七八九])十/g, (_, a, b) => cn[a]*100 + cn[b]*10);
    t = t.replace(/([一二两三四五六七八九])百/g, (_, a) => cn[a]*100);
    t = t.replace(/([二两三四五六七八九])十([一二三四五六七八九])/g, (_, a, b) => cn[a]*10 + cn[b]);
    t = t.replace(/([二两三四五六七八九])十/g, (_, a) => cn[a]*10);
    t = t.replace(/十([一二三四五六七八九])/g, (_, a) => 10 + cn[a]);
    t = t.replace(/十/g, '10');
    for (let k in cn) t = t.replace(new RegExp(k, 'g'), cn[k]);
    t = t.replace(/(\d)\s+(\d)/g, '$1$2');

    const m = t.match(/(\d+(\.\d+)?)/);
    if (!m) return null;
    const amount = parseFloat(m[0]);
    if (amount <= 0 || amount > 9999999) return null;

    let desc = text.replace(/[\d.]+/g, '').replace(/花了|花|元|块钱|块|钱|大约|大概|差不多|了|的|支付|付了|付|收到|到账|入账/g, '').trim();
    if (!desc) desc = voiceType === 'expense' ? '语音支出' : '语音收入';

    const cat = autoCat(text, voiceType);
    return { amount, desc, cat };
}

// =================== 工具方法 ===================
function exportData() {
    if (!records.length) { toast('暂无数据可导出'); return; }
    let csv = 'BOM\n类型,分类,金额,备注,日期\n';
    records.forEach(r => {
        const cats = r.type === 'income' ? INCOME_CATS : EXPENSE_CATS;
        const c = cats[r.cat] || { name:'其他' };
        const d = new Date(r.ts);
        csv += `${r.type === 'income' ? '收入' : '支出'},${c.name},${r.amount},${r.desc},${d.toLocaleString()}\n`;
    });
    const blob = new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `记账数据_${new Date().toLocaleDateString()}.csv`;
    a.click();
    toast('导出成功');
}

function clearData() {
    if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
        records = [];
        save(); renderAll(); applyFilters();
        toast('数据已清空');
    }
}

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.display = 'none', 2000);
}
</script>
